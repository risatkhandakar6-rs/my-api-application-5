          <small>Track and manage your project issues</small>

        </div>
      </div>
      <div class="flex  items-center ">

        <img src="assets/Closed- Status .png" alt="" class="w-4 h-4 ">
        <p class="pr-8">Closed</p>
      </div>
    </div>
  </section>
  <section class=" flex justify-center items-center hidden" id="loading">
    <span class="loading loading-spinner loading-xl"></span>

  </section>
  <section id="container-issues"
    class="w-full max-w-[1110px] bg-[#FBFBFB] mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 mt-4 gap-4 ">
